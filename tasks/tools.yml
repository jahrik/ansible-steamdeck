        path: "{{ ansible_user_dir }}/.config/bat"
        state: absent

- name: Install eza
  when: install | default(true) | bool
  block:
    - name: Check if eza binary exists
      ansible.builtin.stat:
        path: "{{ ansible_user_dir }}/.local/bin/eza"
      register: eza_bin

    - name: Get latest eza release
      ansible.builtin.uri:
        url: https://api.github.com/repos/eza-community/eza/releases/latest
        return_content: true
      register: eza_release
      when: not eza_bin.stat.exists

    - name: Download and extract eza binary
      ansible.builtin.unarchive:
        src: "https://github.com/eza-community/eza/releases/download/{{ eza_release.json.tag_name }}/eza_x86_64-unknown-linux-musl.tar.gz"
        dest: "{{ ansible_user_dir }}/.local/bin"
        mode: '0755'
        remote_src: true
      when: not eza_bin.stat.exists

    - name: Add eza aliases to zsh
      ansible.builtin.lineinfile:
        path: "{{ ansible_user_dir }}/.config/zsh/local.zsh"
        line: "{{ item }}"
        create: true
        mode: '0644'
      loop:
        - "alias ls='eza'"
        - "alias ll='eza -la --git'"
        - "alias la='eza -a'"

- name: Uninstall eza
  when: not (install | default(true) | bool)
  block:
    - name: Remove eza binary
      ansible.builtin.file:
        path: "{{ ansible_user_dir }}/.local/bin/eza"
        state: absent

    - name: Remove eza aliases from zsh
      ansible.builtin.lineinfile:
        path: "{{ ansible_user_dir }}/.config/zsh/local.zsh"
        line: "{{ item }}"
        state: absent
      loop:
        - "alias ls='eza'"
        - "alias ll='eza -la --git'"
        - "alias la='eza -a'"

- name: Install delta
  when: install | default(true) | bool
  block:
    - name: Check if delta binary exists
      ansible.builtin.stat:
        path: "{{ ansible_user_dir }}/.local/bin/delta"
      register: delta_bin

    - name: Get latest delta release
      ansible.builtin.uri:
        url: https://api.github.com/repos/dandavison/delta/releases/latest
        return_content: true
      register: delta_release
      when: not delta_bin.stat.exists

    - name: Download and extract delta binary
      ansible.builtin.unarchive:
        src: "https://github.com/dandavison/delta/releases/download/{{ delta_release.json.tag_name }}/delta-{{ delta_release.json.tag_name }}-x86_64-unknown-linux-musl.tar.gz"
        dest: "{{ ansible_user_dir }}/.local/bin"
        include:
          - "delta-{{ delta_release.json.tag_name }}-x86_64-unknown-linux-musl/delta"
        extra_opts:
          - --strip-components=1
        mode: '0755'
        remote_src: true
      when: not delta_bin.stat.exists

    - name: Set delta as git pager
      community.general.git_config:
        name: core.pager
        value: delta
        scope: global

    - name: Ensure ~/.config/delta directory exists
      ansible.builtin.file:
        path: "{{ ansible_user_dir }}/.config/delta"
        state: directory
        mode: '0755'

    - name: Download Catppuccin delta theme
      ansible.builtin.get_url:
        url: "https://github.com/catppuccin/delta/raw/main/catppuccin.gitconfig"
        dest: "{{ ansible_user_dir }}/.config/delta/catppuccin.gitconfig"
        mode: '0644'

    - name: Include Catppuccin delta theme in git config
      community.general.git_config:
        name: include.path
        value: "{{ ansible_user_dir }}/.config/delta/catppuccin.gitconfig"
        scope: global

    - name: Enable Catppuccin Mocha delta feature
      community.general.git_config:
        name: delta.features
        value: catppuccin-mocha
        scope: global

- name: Uninstall delta
  when: not (install | default(true) | bool)
  block:
    - name: Remove delta binary
      ansible.builtin.file:
        path: "{{ ansible_user_dir }}/.local/bin/delta"
        state: absent

    - name: Remove delta as git pager
      community.general.git_config:
        name: core.pager
        state: absent
        scope: global

    - name: Remove Catppuccin delta feature
      community.general.git_config:
        name: delta.features
        state: absent
        scope: global

    # Remove only our specific include, not any other include.path the user set.
    # git_config state=absent would drop every include.path entry, so use --unset
    # with an anchored regex matching exactly our file. argv avoids shell parsing,
    # which would otherwise strip the regex_escape backslashes.
    - name: Remove Catppuccin delta include
      ansible.builtin.command:
        argv:
          - git
          - config
          - --global
          - --unset
          - include.path
          - "^{{ (ansible_user_dir ~ '/.config/delta/catppuccin.gitconfig') | regex_escape }}$"
      register: delta_include_unset
      changed_when: delta_include_unset.rc == 0
      failed_when: delta_include_unset.rc not in [0, 5]  # noqa: command-instead-of-module

    - name: Remove delta config directory
      ansible.builtin.file:
        path: "{{ ansible_user_dir }}/.config/delta"
        state: absent

