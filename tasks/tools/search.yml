- name: Install bat
  when: install | default(true) | bool
  block:
    - name: Check if bat binary exists
      ansible.builtin.stat:
        path: "{{ ansible_user_dir }}/.local/bin/bat"
      register: bat_bin

    - name: Get latest bat release
      ansible.builtin.uri:
        url: https://api.github.com/repos/sharkdp/bat/releases/latest
        return_content: true
      register: bat_release
      when: not bat_bin.stat.exists

    - name: Download and extract bat binary
      ansible.builtin.unarchive:
        src: "https://github.com/sharkdp/bat/releases/download/{{ bat_release.json.tag_name }}/bat-{{ bat_release.json.tag_name }}-x86_64-unknown-linux-musl.tar.gz"
        dest: "{{ ansible_user_dir }}/.local/bin"
        include:
          - "bat-{{ bat_release.json.tag_name }}-x86_64-unknown-linux-musl/bat"
        extra_opts:
          - --strip-components=1
        mode: '0755'
        remote_src: true
      when: not bat_bin.stat.exists

    - name: Ensure bat themes directory exists
      ansible.builtin.file:
        path: "{{ ansible_user_dir }}/.config/bat/themes"
        state: directory
        mode: '0755'

    - name: Download Catppuccin Mocha bat theme
      ansible.builtin.get_url:
        url: "https://github.com/catppuccin/bat/raw/main/themes/Catppuccin%20Mocha.tmTheme"
        dest: "{{ ansible_user_dir }}/.config/bat/themes/Catppuccin Mocha.tmTheme"
        mode: '0644'
      notify: Rebuild bat theme cache

    - name: Set Catppuccin Mocha as bat theme
      ansible.builtin.lineinfile:
        path: "{{ ansible_user_dir }}/.config/bat/config"
        line: '--theme="Catppuccin Mocha"'
        create: true
        mode: '0644'

- name: Uninstall bat
  when: not (install | default(true) | bool)
  block:
    - name: Remove bat binary
      ansible.builtin.file:
        path: "{{ ansible_user_dir }}/.local/bin/bat"
        state: absent

    - name: Remove bat config and themes
      ansible.builtin.file:
        path: "{{ ansible_user_dir }}/.config/bat"
        state: absent

- name: Install eza
  when: install | default(true) | bool
  block:
    - name: Check if eza binary exists
      ansible.builtin.stat:
        path: "{{ ansible_user_dir }}/.local/bin/eza"
      register: eza_bin

    - name: Get latest eza release
      ansible.builtin.uri:
        url: https://api.github.com/repos/eza-community/eza/releases/latest
        return_content: true
      register: eza_release
      when: not eza_bin.stat.exists

    - name: Download and extract eza binary
      ansible.builtin.unarchive:
        src: "https://github.com/eza-community/eza/releases/download/{{ eza_release.json.tag_name }}/eza_x86_64-unknown-linux-musl.tar.gz"
        dest: "{{ ansible_user_dir }}/.local/bin"
        mode: '0755'
        remote_src: true
      when: not eza_bin.stat.exists

    - name: Add eza aliases to zsh
      ansible.builtin.lineinfile:
        path: "{{ ansible_user_dir }}/.config/zsh/local.zsh"
        line: "{{ item }}"
        create: true
        mode: '0644'
      loop:
        - "alias ls='eza'"
        - "alias ll='eza -la --git'"
        - "alias la='eza -a'"

- name: Uninstall eza
  when: not (install | default(true) | bool)
  block:
    - name: Remove eza binary
      ansible.builtin.file:
        path: "{{ ansible_user_dir }}/.local/bin/eza"
        state: absent

    - name: Remove eza aliases from zsh
      ansible.builtin.lineinfile:
        path: "{{ ansible_user_dir }}/.config/zsh/local.zsh"
        line: "{{ item }}"
        state: absent
      loop:
        - "alias ls='eza'"
        - "alias ll='eza -la --git'"
        - "alias la='eza -a'"
