---
- name: Install zoxide
  when: install | default(true) | bool
  block:
    - name: Check if zoxide binary exists
      ansible.builtin.stat:
        path: "{{ ansible_user_dir }}/.local/bin/zoxide"
      register: zoxide_bin

    - name: Get latest zoxide release
      ansible.builtin.uri:
        url: https://api.github.com/repos/ajeetdsouza/zoxide/releases/latest
        return_content: true
      register: zoxide_release
      when: not zoxide_bin.stat.exists

    - name: Download and extract zoxide binary
      ansible.builtin.unarchive:
        src: "https://github.com/ajeetdsouza/zoxide/releases/download/{{ zoxide_release.json.tag_name }}/zoxide-{{ zoxide_release.json.tag_name | regex_replace('^v', '') }}-x86_64-unknown-linux-musl.tar.gz"
        dest: "{{ ansible_user_dir }}/.local/bin"
        include:
          - zoxide
        mode: '0755'
        remote_src: true
      when: not zoxide_bin.stat.exists

    - name: Enable zoxide shell integration in zsh
      ansible.builtin.lineinfile:
        path: "{{ ansible_user_dir }}/.config/zsh/local.zsh"
        line: 'command -v zoxide >/dev/null && eval "$(zoxide init zsh)"'
        create: true
        mode: '0644'

- name: Uninstall zoxide
  when: not (install | default(true) | bool)
  block:
    - name: Remove zoxide binary
      ansible.builtin.file:
        path: "{{ ansible_user_dir }}/.local/bin/zoxide"
        state: absent

    - name: Remove zoxide shell integration from zsh
      ansible.builtin.lineinfile:
        path: "{{ ansible_user_dir }}/.config/zsh/local.zsh"
        line: 'command -v zoxide >/dev/null && eval "$(zoxide init zsh)"'
        state: absent

