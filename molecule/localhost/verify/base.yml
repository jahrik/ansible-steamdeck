---
- name: Check base role binaries exist
  ansible.builtin.stat:
    path: "{{ ansible_facts['user_dir'] }}/.local/bin/{{ item }}"
  register: base_bins
  loop:
    - alacritty
    - zsh
    - nvim

- name: Assert base role binaries are installed
  ansible.builtin.assert:
    that: item.stat.exists
    fail_msg: "Missing binary: {{ item.item }}"
  loop: "{{ base_bins.results }}"
  loop_control:
    label: "{{ item.item }}"

- name: Check Konsole profile exists
  ansible.builtin.stat:
    path: "{{ ansible_facts['user_dir'] }}/.local/share/konsole/Default.profile"
  register: konsole_profile

- name: Assert Konsole profile exists
  ansible.builtin.assert:
    that: konsole_profile.stat.exists

- name: Check Catppuccin Mocha color scheme was downloaded
  ansible.builtin.stat:
    path: "{{ ansible_facts['user_dir'] }}/.local/share/konsole/catppuccin-mocha.colorscheme"
  register: catppuccin_colorscheme

- name: Assert Catppuccin Mocha color scheme exists
  ansible.builtin.assert:
    that: catppuccin_colorscheme.stat.exists

- name: Check Konsole profile sets zsh as shell
  ansible.builtin.command: grep -q "Command=.*zsh" "{{ ansible_facts['user_dir'] }}/.local/share/konsole/Default.profile"
  changed_when: false

- name: Check Konsole profile uses Catppuccin Mocha
  ansible.builtin.command: grep -q "ColorScheme=catppuccin-mocha" "{{ ansible_facts['user_dir'] }}/.local/share/konsole/Default.profile"
  changed_when: false

- name: Check konsolerc sets default profile
  ansible.builtin.command: grep -q "DefaultProfile.*Default.profile" "{{ ansible_facts['user_dir'] }}/.config/konsolerc"
  changed_when: false
