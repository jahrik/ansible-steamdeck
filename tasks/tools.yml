      ansible.builtin.file:
        path: "{{ ansible_user_dir }}/.config/btop/themes"
        state: directory
        mode: '0755'

    - name: Download Catppuccin Mocha btop theme
      ansible.builtin.get_url:
        url: "https://github.com/catppuccin/btop/raw/main/themes/catppuccin_mocha.theme"
        dest: "{{ ansible_user_dir }}/.config/btop/themes/catppuccin_mocha.theme"
        mode: '0644'

    - name: Set btop color theme
      ansible.builtin.lineinfile:
        path: "{{ ansible_user_dir }}/.config/btop/btop.conf"
        regexp: '^color_theme\s*='
        line: 'color_theme = "catppuccin_mocha"'
        create: true
        mode: '0644'

    - name: Disable btop theme background
      ansible.builtin.lineinfile:
        path: "{{ ansible_user_dir }}/.config/btop/btop.conf"
        regexp: '^theme_background\s*='
        line: 'theme_background = False'
        create: true
        mode: '0644'

- name: Untheme btop
  when: not (install | default(true) | bool)
  block:
    - name: Remove btop Catppuccin theme
      ansible.builtin.file:
