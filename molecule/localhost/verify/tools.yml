---
- name: Check tool binaries exist
  ansible.builtin.stat:
    path: "{{ ansible_facts['user_dir'] }}/.local/bin/{{ item }}"
  register: tool_bins
  loop:
    - rg
    - bat
    - eza
    - delta
    - zoxide
    - lazygit
    - yq
    - fzf
    - fd
    - gh
    - direnv
    - tldr
    - uv
    - uvx

- name: Assert tool binaries are installed
  ansible.builtin.assert:
    that: item.stat.exists
    fail_msg: "Missing binary: {{ item.item }}"
  loop: "{{ tool_bins.results }}"
  loop_control:
    label: "{{ item.item }}"

- name: Check go binary exists
  ansible.builtin.stat:
    path: "{{ ansible_facts['user_dir'] }}/.local/go/bin/go"
  register: go_bin

- name: Assert go is installed
  ansible.builtin.assert:
    that: go_bin.stat.exists

- name: Check eza aliases in zsh
  ansible.builtin.command: grep -q "alias ls='eza'" "{{ ansible_facts['user_dir'] }}/.config/zsh/local.zsh"
  changed_when: false

- name: Check delta is set as git pager
  community.general.git_config_info:
    name: core.pager
    scope: global
  register: git_pager

- name: Assert delta is git pager
  ansible.builtin.assert:
    that: git_pager.config_value == 'delta'

- name: Check zoxide shell integration in zsh
  ansible.builtin.command: grep -q "zoxide init zsh" "{{ ansible_facts['user_dir'] }}/.config/zsh/local.zsh"
  changed_when: false

- name: Check tmux config exists
  ansible.builtin.stat:
    path: "{{ ansible_facts['user_dir'] }}/.config/tmux/tmux.conf"
  register: tmux_conf

- name: Assert tmux config exists
  ansible.builtin.assert:
    that: tmux_conf.stat.exists

- name: Check Go PATH in zsh local config
  ansible.builtin.command: grep -q "go/bin" "{{ ansible_facts['user_dir'] }}/.config/zsh/local.zsh"
  changed_when: false

- name: Check fzf shell integration in local.zsh
  ansible.builtin.command: grep -q "fzf --zsh" "{{ ansible_facts['user_dir'] }}/.config/zsh/local.zsh"
  changed_when: false

- name: Check direnv shell integration in zsh
  ansible.builtin.command: grep -q "direnv hook zsh" "{{ ansible_facts['user_dir'] }}/.config/zsh/local.zsh"
  changed_when: false

- name: Check bat config sets Catppuccin theme
  ansible.builtin.command: grep -q "Catppuccin Mocha" "{{ ansible_facts['user_dir'] }}/.config/bat/config"
  changed_when: false

- name: Check lazygit config exists
  ansible.builtin.stat:
    path: "{{ ansible_facts['user_dir'] }}/.config/lazygit/config.yml"
  register: lazygit_config

- name: Assert lazygit config is installed
  ansible.builtin.assert:
    that: lazygit_config.stat.exists

- name: Check btop Catppuccin theme exists
  ansible.builtin.stat:
    path: "{{ ansible_facts['user_dir'] }}/.config/btop/themes/catppuccin_mocha.theme"
  register: btop_theme

- name: Assert btop theme is installed
  ansible.builtin.assert:
    that: btop_theme.stat.exists

- name: Check fzf Catppuccin theme is sourced in zsh
  ansible.builtin.command: grep -q "catppuccin-mocha.sh" "{{ ansible_facts['user_dir'] }}/.config/zsh/local.zsh"
  changed_when: false

- name: Check delta Catppuccin feature is set
  community.general.git_config_info:
    name: delta.features
    scope: global
  register: delta_feature

- name: Assert delta uses Catppuccin Mocha
  ansible.builtin.assert:
    that: delta_feature.config_value == 'catppuccin-mocha'
