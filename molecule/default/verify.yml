---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - name: Stat ~/.local/share/fonts/DejaVuSansMNerdFontMono-Regular.ttf
      ansible.builtin.stat:
        path: ~/.local/share/fonts/DejaVuSansMNerdFontMono-Regular.ttf
      register: nerd_font

    - name: Assert Nerd Font is installed
      ansible.builtin.assert:
        that: nerd_font.stat.exists
        fail_msg: "~/.local/share/fonts/DejaVuSansMNerdFontMono-Regular.ttf not found"

    - name: Stat ~/.local/bin/zsh
      ansible.builtin.stat:
        path: ~/.local/bin/zsh
      register: zsh_bin

    - name: Assert zsh binary exists
      ansible.builtin.assert:
        that: zsh_bin.stat.exists
        fail_msg: "~/.local/bin/zsh not found"

    - name: Stat ~/.config/zsh/.zshrc
      ansible.builtin.stat:
        path: ~/.config/zsh/.zshrc
      register: zshrc_cfg

    - name: Assert zshrc config exists
      ansible.builtin.assert:
        that: zshrc_cfg.stat.exists
        fail_msg: "~/.config/zsh/.zshrc not found"

    - name: Stat ~/.local/bin/nvim
      ansible.builtin.stat:
        path: ~/.local/bin/nvim
      register: nvim_bin

    - name: Assert nvim binary exists
      ansible.builtin.assert:
        that: nvim_bin.stat.exists
        fail_msg: "~/.local/bin/nvim not found"

    - name: Stat ~/.config/nvim/init.lua
      ansible.builtin.stat:
        path: ~/.config/nvim/init.lua
      register: init_lua

    - name: Assert nvim config exists
      ansible.builtin.assert:
        that: init_lua.stat.exists
        fail_msg: "~/.config/nvim/init.lua not found"

    - name: Stat ~/.local/share/konsole/Default.profile
      ansible.builtin.stat:
        path: ~/.local/share/konsole/Default.profile
      register: konsole_profile_stat

    - name: Assert Konsole profile exists
      ansible.builtin.assert:
        that: konsole_profile_stat.stat.exists
        fail_msg: "~/.local/share/konsole/Default.profile not found"

    - name: Stat ~/.local/share/konsole/catppuccin-mocha.colorscheme
      ansible.builtin.stat:
        path: ~/.local/share/konsole/catppuccin-mocha.colorscheme
      register: catppuccin_colorscheme_stat

    - name: Assert Catppuccin Mocha color scheme was downloaded
      ansible.builtin.assert:
        that: catppuccin_colorscheme_stat.stat.exists
        fail_msg: "~/.local/share/konsole/catppuccin-mocha.colorscheme not found"

    - name: Check Konsole profile sets zsh as shell
      ansible.builtin.command: grep -q "Command=.*zsh" ~/.local/share/konsole/Default.profile
      changed_when: false

    - name: Check Konsole profile uses Catppuccin Mocha color scheme
      ansible.builtin.command: grep -q "ColorScheme=catppuccin-mocha" ~/.local/share/konsole/Default.profile
      changed_when: false

    - name: Check konsolerc sets default profile
      ansible.builtin.command: grep -q "DefaultProfile.*Default.profile" ~/.config/konsolerc
      changed_when: false

- name: Verify uninstall
  hosts: all
  gather_facts: true
  tasks:
    - name: Run jahrik.steamdeck with install false
      ansible.builtin.include_role:
        name: jahrik.steamdeck
      vars:
        install: false

    - name: Stat ~/.local/share/konsole/Default.profile
      ansible.builtin.stat:
        path: ~/.local/share/konsole/Default.profile
      register: konsole_profile_removed

    - name: Assert Konsole profile is removed
      ansible.builtin.assert:
        that: not konsole_profile_removed.stat.exists
        fail_msg: "~/.local/share/konsole/Default.profile still present after uninstall"

    - name: Stat ~/.local/share/konsole/catppuccin-mocha.colorscheme
      ansible.builtin.stat:
        path: ~/.local/share/konsole/catppuccin-mocha.colorscheme
      register: catppuccin_colorscheme_removed

    - name: Assert Catppuccin Mocha color scheme is removed
      ansible.builtin.assert:
        that: not catppuccin_colorscheme_removed.stat.exists
        fail_msg: "~/.local/share/konsole/catppuccin-mocha.colorscheme still present after uninstall"

    - name: Check konsolerc no longer sets a default profile
      ansible.builtin.command: grep -q "DefaultProfile.*Default.profile" ~/.config/konsolerc
      register: konsolerc_default_profile
      changed_when: false
      failed_when: false

    - name: Assert konsolerc default profile setting is removed
      ansible.builtin.assert:
        that: konsolerc_default_profile.rc != 0
        fail_msg: "~/.config/konsolerc still sets DefaultProfile after uninstall"

    - name: Stat ~/.local/bin/fzf
      ansible.builtin.stat:
        path: ~/.local/bin/fzf
      register: fzf_bin_removed

    - name: Assert fzf binary is removed
      ansible.builtin.assert:
        that: not fzf_bin_removed.stat.exists
        fail_msg: "~/.local/bin/fzf still present after uninstall"

    - name: Stat ~/.local/bin/bat
      ansible.builtin.stat:
        path: ~/.local/bin/bat
      register: bat_bin_removed

    - name: Assert bat binary is removed
      ansible.builtin.assert:
        that: not bat_bin_removed.stat.exists
        fail_msg: "~/.local/bin/bat still present after uninstall"
