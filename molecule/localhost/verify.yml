---
- name: Verify
  hosts: all
  gather_facts: true
  tasks:
    - name: Verify base roles and Konsole
      ansible.builtin.import_tasks: verify/base.yml

    - name: Verify CLI tools
      ansible.builtin.import_tasks: verify/tools.yml

    - name: Verify Docker/dind
      ansible.builtin.import_tasks: verify/docker.yml

    - name: Verify KDE Plasma
      ansible.builtin.import_tasks: verify/kde.yml
