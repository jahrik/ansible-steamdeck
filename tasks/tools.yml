        uv_version: "{{ uv_release.json.tag_name | regex_replace('^v', '') }}"
      when: not uv_bin.stat.exists

    - name: Download and extract uv binaries
      ansible.builtin.unarchive:
        src: "https://github.com/astral-sh/uv/releases/download/{{ uv_release.json.tag_name }}/uv-x86_64-unknown-linux-gnu.tar.gz"
        dest: "{{ ansible_user_dir }}/.local/bin"
        include:
          - uv-x86_64-unknown-linux-gnu/uv
          - uv-x86_64-unknown-linux-gnu/uvx
        extra_opts:
          - --strip-components=1
        mode: '0755'
        remote_src: true
      when: not uv_bin.stat.exists

- name: Uninstall uv
  when: not (install | default(true) | bool)
  block:
    - name: Remove uv binaries
      ansible.builtin.file:
        path: "{{ ansible_user_dir }}/.local/bin/{{ item }}"
        state: absent
      loop:
        - uv
        - uvx

- name: Install Go
  when: install | default(true) | bool
  block:
    - name: Check if go binary exists
      ansible.builtin.stat:
        path: "{{ ansible_user_dir }}/.local/go/bin/go"
      register: go_bin

    - name: Download and extract Go toolchain
      ansible.builtin.unarchive:
        src: "https://dl.google.com/go/go{{ go_version }}.linux-amd64.tar.gz"
        dest: "{{ ansible_user_dir }}/.local"
        remote_src: true
      when: not go_bin.stat.exists

    - name: Add Go bin to PATH in zsh
      ansible.builtin.lineinfile:
        path: "{{ ansible_user_dir }}/.config/zsh/local.zsh"
        line: 'export PATH="$HOME/.local/go/bin:$HOME/go/bin:$PATH"'
        create: true
        mode: '0644'

- name: Uninstall Go
  when: not (install | default(true) | bool)
  block:
    - name: Remove Go toolchain
      ansible.builtin.file:
        path: "{{ ansible_user_dir }}/.local/go"
        state: absent

    - name: Remove Go PATH from zsh
      ansible.builtin.lineinfile:
        path: "{{ ansible_user_dir }}/.config/zsh/local.zsh"
        line: 'export PATH="$HOME/.local/go/bin:$HOME/go/bin:$PATH"'
        state: absent
