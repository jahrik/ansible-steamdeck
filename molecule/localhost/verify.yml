---
- name: Verify
  hosts: all
  gather_facts: true
  tasks:
    - name: Check alacritty binary exists
      ansible.builtin.command: which alacritty
      register: alacritty_bin
      changed_when: false

    - name: Assert alacritty is installed
      ansible.builtin.assert:
        that: alacritty_bin.rc == 0

    - name: Check zsh binary exists
      ansible.builtin.command: which zsh
      register: zsh_bin
      changed_when: false

    - name: Assert zsh is installed
      ansible.builtin.assert:
        that: zsh_bin.rc == 0

    - name: Check nvim binary exists
      ansible.builtin.command: which nvim
      register: nvim_bin
      changed_when: false

    - name: Assert nvim is installed
      ansible.builtin.assert:
        that: nvim_bin.rc == 0

    - name: Check Konsole profile exists
      ansible.builtin.stat:
        path: "{{ ansible_user_dir }}/.local/share/konsole/Default.profile"
      register: konsole_profile

    - name: Assert Konsole profile exists
      ansible.builtin.assert:
        that: konsole_profile.stat.exists

    - name: Check Catppuccin Mocha color scheme was downloaded
      ansible.builtin.stat:
        path: "{{ ansible_user_dir }}/.local/share/konsole/catppuccin-mocha.colorscheme"
      register: catppuccin_colorscheme

    - name: Assert Catppuccin Mocha color scheme exists
      ansible.builtin.assert:
        that: catppuccin_colorscheme.stat.exists

    - name: Check Konsole profile sets zsh as shell
      ansible.builtin.command: grep -q "Command=.*zsh" "{{ ansible_user_dir }}/.local/share/konsole/Default.profile"
      changed_when: false

    - name: Check Konsole profile uses Catppuccin Mocha
      ansible.builtin.command: grep -q "ColorScheme=Catppuccin Mocha" "{{ ansible_user_dir }}/.local/share/konsole/Default.profile"
      changed_when: false

    - name: Check konsolerc sets default profile
      ansible.builtin.command: grep -q "DefaultProfile.*Default.profile" "{{ ansible_user_dir }}/.config/konsolerc"
      changed_when: false

    - name: Check rg binary exists
      ansible.builtin.command: which rg
      changed_when: false

    - name: Check bat binary exists
      ansible.builtin.command: which bat
      changed_when: false

    - name: Check eza binary exists
      ansible.builtin.command: which eza
      changed_when: false

    - name: Check eza aliases in zsh
      ansible.builtin.command: grep -q "alias ls='eza'" "{{ ansible_user_dir }}/.config/zsh/local.zsh"
      changed_when: false

    - name: Check delta binary exists
      ansible.builtin.command: which delta
      changed_when: false

    - name: Check delta is set as git pager
      community.general.git_config_info:
        name: core.pager
        scope: global
      register: git_pager

    - name: Assert delta is git pager
      ansible.builtin.assert:
        that: git_pager.config_value == 'delta'

    - name: Check zoxide binary exists
      ansible.builtin.command: which zoxide
      changed_when: false

    - name: Check zoxide shell integration in zsh
      ansible.builtin.command: grep -q "zoxide init zsh" "{{ ansible_user_dir }}/.config/zsh/local.zsh"
      changed_when: false

    - name: Check lazygit binary exists
      ansible.builtin.command: which lazygit
      changed_when: false

    - name: Check yq binary exists
      ansible.builtin.command: which yq
      changed_when: false

    - name: Check tmux config exists
      ansible.builtin.stat:
        path: "{{ ansible_user_dir }}/.config/tmux/tmux.conf"
      register: tmux_conf

    - name: Assert tmux config exists
      ansible.builtin.assert:
        that: tmux_conf.stat.exists

    - name: Check uv binary exists
      ansible.builtin.stat:
        path: "{{ ansible_user_dir }}/.local/bin/uv"
      register: uv_bin

    - name: Assert uv is installed
      ansible.builtin.assert:
        that: uv_bin.stat.exists

    - name: Check uvx binary exists
      ansible.builtin.stat:
        path: "{{ ansible_user_dir }}/.local/bin/uvx"
      register: uvx_bin

    - name: Assert uvx is installed
      ansible.builtin.assert:
        that: uvx_bin.stat.exists

    - name: Check go binary exists
      ansible.builtin.stat:
        path: "{{ ansible_user_dir }}/.local/go/bin/go"
      register: go_bin

    - name: Assert go is installed
      ansible.builtin.assert:
        that: go_bin.stat.exists

    - name: Check Go PATH in zsh local config
      ansible.builtin.command: grep -q "go/bin" "{{ ansible_user_dir }}/.config/zsh/local.zsh"
      changed_when: false

    - name: Check fzf binary exists
      ansible.builtin.command: which fzf
      register: fzf_bin
      changed_when: false

    - name: Assert fzf is installed
      ansible.builtin.assert:
        that: fzf_bin.rc == 0

    - name: Check fzf shell integration in local.zsh
      ansible.builtin.command: grep -q "fzf --zsh" "{{ ansible_user_dir }}/.config/zsh/local.zsh"
      changed_when: false

    - name: Check dswarm wrapper exists
      ansible.builtin.stat:
        path: "{{ ansible_user_dir }}/.local/bin/dswarm"
      register: dswarm_bin

    - name: Assert dswarm is installed
      ansible.builtin.assert:
        that: dswarm_bin.stat.exists

    - name: Check docker-cli binary exists
      ansible.builtin.stat:
        path: "{{ ansible_user_dir }}/.local/bin/docker-cli"
      register: docker_cli_bin

    - name: Assert docker-cli is installed
      ansible.builtin.assert:
        that: docker_cli_bin.stat.exists

    - name: Check dind container is running
      ansible.builtin.command: podman ps --filter name=dind --filter status=running --quiet
      register: dind_running
      changed_when: false

    - name: Assert dind container is running
      ansible.builtin.assert:
        that: dind_running.stdout != ''
        fail_msg: "dind container is not running"

    - name: Check Docker Swarm is initialized
      ansible.builtin.command: "{{ ansible_user_dir }}/.local/bin/docker-cli --host {{ dind_host }} info --format '{{ '{{' }}.Swarm.LocalNodeState{{ '}}' }}'"
      register: swarm_state
      changed_when: false

    - name: Assert Docker Swarm is initialized
      ansible.builtin.assert:
        that: swarm_state.stdout == 'active'
        fail_msg: "Docker Swarm is not initialized (state: {{ swarm_state.stdout }})"

    - name: Check fd binary exists
      ansible.builtin.command: which fd
      changed_when: false

    - name: Check gh binary exists
      ansible.builtin.command: which gh
      changed_when: false

    - name: Check direnv binary exists
      ansible.builtin.command: which direnv
      changed_when: false

    - name: Check direnv shell integration in zsh
      ansible.builtin.command: grep -q "direnv hook zsh" "{{ ansible_user_dir }}/.config/zsh/local.zsh"
      changed_when: false

    - name: Check tldr binary exists
      ansible.builtin.command: which tldr
      changed_when: false

    - name: Check bat config sets Catppuccin theme
      ansible.builtin.command: grep -q "Catppuccin Mocha" "{{ ansible_user_dir }}/.config/bat/config"
      changed_when: false

    - name: Check lazygit config exists
      ansible.builtin.stat:
        path: "{{ ansible_user_dir }}/.config/lazygit/config.yml"
      register: lazygit_config

    - name: Assert lazygit config is installed
      ansible.builtin.assert:
        that: lazygit_config.stat.exists

    - name: Check btop Catppuccin theme exists
      ansible.builtin.stat:
        path: "{{ ansible_user_dir }}/.config/btop/themes/catppuccin_mocha.theme"
      register: btop_theme

    - name: Assert btop theme is installed
      ansible.builtin.assert:
        that: btop_theme.stat.exists

    - name: Check fzf Catppuccin theme is sourced in zsh
      ansible.builtin.command: grep -q "catppuccin-mocha.sh" "{{ ansible_user_dir }}/.config/zsh/local.zsh"
      changed_when: false

    - name: Check delta Catppuccin feature is set
      community.general.git_config_info:
        name: delta.features
        scope: global
      register: delta_feature

    - name: Assert delta uses Catppuccin Mocha
      ansible.builtin.assert:
        that: delta_feature.config_value == 'catppuccin-mocha'

    - name: Check Catppuccin color scheme file exists
      ansible.builtin.stat:
        path: "{{ ansible_user_dir }}/.local/share/color-schemes/CatppuccinMochaMauve.colors"
      register: kde_colorscheme_file

    - name: Assert Catppuccin color scheme is installed
      ansible.builtin.assert:
        that: kde_colorscheme_file.stat.exists

    - name: Check active KDE color scheme
      ansible.builtin.command:
        cmd: kreadconfig6 --file {{ ansible_user_dir }}/.config/kdeglobals --group General --key ColorScheme
      register: kde_active_scheme
      changed_when: false

    - name: Assert Catppuccin Mocha is the active color scheme
      ansible.builtin.assert:
        that: kde_active_scheme.stdout == 'CatppuccinMochaMauve'
        fail_msg: "Active color scheme is {{ kde_active_scheme.stdout }}, expected CatppuccinMochaMauve"

    - name: Check wallpaper file exists
      ansible.builtin.stat:
        path: "{{ ansible_user_dir }}/.local/share/wallpapers/catppuccin-mocha.jpg"
      register: kde_wallpaper_file

    - name: Assert wallpaper is installed
      ansible.builtin.assert:
        that: kde_wallpaper_file.stat.exists

    - name: Find plasma panel containment ID
      ansible.builtin.shell:
        cmd: |
          python3 -c "
          import re
          with open('{{ ansible_user_dir }}/.config/plasma-org.kde.plasma.desktop-appletsrc') as f:
              content = f.read()
          m = re.search(r'\[Containments\]\[(\d+)\][^\[]*?plugin=org\.kde\.panel', content, re.DOTALL)
          print(m.group(1) if m else '')
          "
      register: verify_panel_id
      changed_when: false

    - name: Check panel location
      ansible.builtin.command:
        cmd: >
          kreadconfig6
          --file {{ ansible_user_dir }}/.config/plasma-org.kde.plasma.desktop-appletsrc
          --group Containments --group {{ verify_panel_id.stdout }} --key location
      register: kde_panel_location
      changed_when: false

    - name: Assert panel is at the bottom
      ansible.builtin.assert:
        that: kde_panel_location.stdout == '4'
        fail_msg: "Panel location is {{ kde_panel_location.stdout }}, expected 4 (bottom)"

    - name: Check window decoration theme
      ansible.builtin.command:
        cmd: kreadconfig6 --file {{ ansible_user_dir }}/.config/kwinrc --group org.kde.kdecoration2 --key theme
      register: kde_deco
      changed_when: false

    - name: Assert Catppuccin window decoration is set
      ansible.builtin.assert:
        that: kde_deco.stdout == '__aurorae__svg__CatppuccinMocha-Modern'
        fail_msg: "Window decoration is {{ kde_deco.stdout }}"

    - name: Check cursor theme
      ansible.builtin.command:
        cmd: kreadconfig6 --file {{ ansible_user_dir }}/.config/kcminputrc --group Mouse --key cursorTheme
      register: kde_cursor
      changed_when: false

    - name: Assert Catppuccin cursor theme is set
      ansible.builtin.assert:
        that: kde_cursor.stdout == 'catppuccin-mocha-mauve-cursors'
        fail_msg: "Cursor theme is {{ kde_cursor.stdout }}"

    - name: Check icon theme
      ansible.builtin.command:
        cmd: kreadconfig6 --file {{ ansible_user_dir }}/.config/kdeglobals --group Icons --key Theme
      register: kde_icons
      changed_when: false

    - name: Assert Papirus-Dark icon theme is set
      ansible.builtin.assert:
        that: kde_icons.stdout == 'Papirus-Dark'
        fail_msg: "Icon theme is {{ kde_icons.stdout }}"
