---
dependency:
  name: galaxy
driver:
  name: default
platforms:
  - name: localhost
provisioner:
  name: ansible
  connection_options:
    ansible_connection: local
  inventory:
    hosts:
      all:
        vars:
          dind_host: tcp://127.0.0.1:2375
        hosts:
          localhost:
            ansible_connection: local
            ansible_python_interpreter: "{{ ansible_playbook_python }}"
verifier:
  name: ansible
