---
- name: Install zoxide
  when: install | default(true) | bool
  block:
    - name: Check if zoxide binary exists
      ansible.builtin.stat:
        path: "{{ ansible_facts['user_dir'] }}/.local/bin/zoxide"
      register: zoxide_bin

    - name: Download zoxide archive
      ansible.builtin.get_url:
        url: "https://github.com/ajeetdsouza/zoxide/releases/download/v{{ zoxide_version }}/zoxide-{{ zoxide_version }}-x86_64-unknown-linux-musl.tar.gz"
        dest: "{{ ansible_facts['user_dir'] }}/.cache/ansible-steamdeck/zoxide-{{ zoxide_version }}.tar.gz"
        checksum: "{{ zoxide_checksum }}"
        mode: '0644'
      when: not zoxide_bin.stat.exists

    - name: Extract zoxide binary
      ansible.builtin.unarchive:
        src: "{{ ansible_facts['user_dir'] }}/.cache/ansible-steamdeck/zoxide-{{ zoxide_version }}.tar.gz"
        dest: "{{ ansible_facts['user_dir'] }}/.local/bin"
        include:
          - zoxide
        mode: '0755'
        remote_src: true
      when: not zoxide_bin.stat.exists

    - name: Enable zoxide shell integration in zsh
      ansible.builtin.lineinfile:
        path: "{{ ansible_facts['user_dir'] }}/.config/zsh/local.zsh"
        line: 'command -v zoxide >/dev/null && eval "$(zoxide init zsh)"'
        create: true
        mode: '0644'

- name: Uninstall zoxide
  when: not (install | default(true) | bool)
  block:
    - name: Remove zoxide binary
      ansible.builtin.file:
        path: "{{ ansible_facts['user_dir'] }}/.local/bin/zoxide"
        state: absent

    - name: Remove zoxide shell integration from zsh
      ansible.builtin.lineinfile:
        path: "{{ ansible_facts['user_dir'] }}/.config/zsh/local.zsh"
        line: 'command -v zoxide >/dev/null && eval "$(zoxide init zsh)"'
        state: absent

