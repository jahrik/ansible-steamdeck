---
- name: Check Catppuccin color scheme file exists
  ansible.builtin.stat:
    path: "{{ ansible_user_dir }}/.local/share/color-schemes/CatppuccinMochaMauve.colors"
  register: kde_colorscheme_file

- name: Assert Catppuccin color scheme is installed
  ansible.builtin.assert:
    that: kde_colorscheme_file.stat.exists

- name: Check active KDE color scheme
  ansible.builtin.command:
    cmd: kreadconfig6 --file {{ ansible_user_dir }}/.config/kdeglobals --group General --key ColorScheme
  register: kde_active_scheme
  changed_when: false

- name: Assert Catppuccin Mocha is the active color scheme
  ansible.builtin.assert:
    that: kde_active_scheme.stdout == 'CatppuccinMochaMauve'
    fail_msg: "Active color scheme is {{ kde_active_scheme.stdout }}, expected CatppuccinMochaMauve"

- name: Check wallpaper file exists
  ansible.builtin.stat:
    path: "{{ ansible_user_dir }}/.local/share/wallpapers/catppuccin-mocha.jpg"
  register: kde_wallpaper_file

- name: Assert wallpaper is installed
  ansible.builtin.assert:
    that: kde_wallpaper_file.stat.exists

- name: Read Plasma applets config
  ansible.builtin.slurp:
    src: "{{ ansible_user_dir }}/.config/plasma-org.kde.plasma.desktop-appletsrc"
  register: verify_appletsrc

- name: Find plasma panel containment ID
  ansible.builtin.set_fact:
    verify_panel_id: "{{ (verify_appletsrc.content | b64decode | regex_search('\\[Containments\\]\\[(\\d+)\\][^\\[]*?plugin=org\\.kde\\.panel', '\\1') or ['']) | first }}"

- name: Check panel location
  ansible.builtin.command:
    cmd: >
      kreadconfig6
      --file {{ ansible_user_dir }}/.config/plasma-org.kde.plasma.desktop-appletsrc
      --group Containments --group {{ verify_panel_id }} --key location
  register: kde_panel_location
  changed_when: false

- name: Assert panel is at the bottom
  ansible.builtin.assert:
    that: kde_panel_location.stdout == '4'
    fail_msg: "Panel location is {{ kde_panel_location.stdout }}, expected 4 (bottom)"

- name: Check window decoration theme
  ansible.builtin.command:
    cmd: kreadconfig6 --file {{ ansible_user_dir }}/.config/kwinrc --group org.kde.kdecoration2 --key theme
  register: kde_deco
  changed_when: false

- name: Assert Catppuccin window decoration is set
  ansible.builtin.assert:
    that: kde_deco.stdout == '__aurorae__svg__CatppuccinMocha-Modern'
    fail_msg: "Window decoration is {{ kde_deco.stdout }}"

- name: Check cursor theme
  ansible.builtin.command:
    cmd: kreadconfig6 --file {{ ansible_user_dir }}/.config/kcminputrc --group Mouse --key cursorTheme
  register: kde_cursor
  changed_when: false

- name: Assert Catppuccin cursor theme is set
  ansible.builtin.assert:
    that: kde_cursor.stdout == 'catppuccin-mocha-mauve-cursors'
    fail_msg: "Cursor theme is {{ kde_cursor.stdout }}"

- name: Check icon theme
  ansible.builtin.command:
    cmd: kreadconfig6 --file {{ ansible_user_dir }}/.config/kdeglobals --group Icons --key Theme
  register: kde_icons
  changed_when: false

- name: Assert Papirus-Dark icon theme is set
  ansible.builtin.assert:
    that: kde_icons.stdout == 'Papirus-Dark'
    fail_msg: "Icon theme is {{ kde_icons.stdout }}"
