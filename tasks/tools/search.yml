---
- name: Install fzf
  when: install | default(true) | bool
  block:
    - name: Check if fzf binary exists
      ansible.builtin.stat:
        path: "{{ ansible_user_dir }}/.local/bin/fzf"
      register: fzf_bin

    - name: Get latest fzf release
      ansible.builtin.uri:
        url: https://api.github.com/repos/junegunn/fzf/releases/latest
        return_content: true
      register: fzf_release
      when: not fzf_bin.stat.exists

    - name: Set fzf version fact
      ansible.builtin.set_fact:
        fzf_version: "{{ fzf_release.json.tag_name | regex_replace('^v', '') }}"
      when: not fzf_bin.stat.exists

    - name: Download and extract fzf binary
      ansible.builtin.unarchive:
        src: "https://github.com/junegunn/fzf/releases/download/v{{ fzf_version }}/fzf-{{ fzf_version }}-linux_amd64.tar.gz"
        dest: "{{ ansible_user_dir }}/.local/bin"
        include:
          - fzf
        mode: '0755'
        remote_src: true
      when: not fzf_bin.stat.exists

    - name: Enable fzf shell integration in zsh
      ansible.builtin.lineinfile:
        path: "{{ ansible_user_dir }}/.config/zsh/local.zsh"
        line: 'command -v fzf >/dev/null && eval "$(fzf --zsh)"'
        create: true
        mode: '0644'

    - name: Ensure ~/.config/fzf directory exists
      ansible.builtin.file:
        path: "{{ ansible_user_dir }}/.config/fzf"
        state: directory
        mode: '0755'

    - name: Download Catppuccin Mocha fzf theme
      ansible.builtin.get_url:
        url: "https://github.com/catppuccin/fzf/raw/main/themes/catppuccin-fzf-mocha.sh"
        dest: "{{ ansible_user_dir }}/.config/fzf/catppuccin-mocha.sh"
        mode: '0644'

    - name: Source fzf Catppuccin theme in zsh
      ansible.builtin.lineinfile:
        path: "{{ ansible_user_dir }}/.config/zsh/local.zsh"
        line: '[ -f "$HOME/.config/fzf/catppuccin-mocha.sh" ] && source "$HOME/.config/fzf/catppuccin-mocha.sh"'
        create: true
        mode: '0644'

- name: Uninstall fzf
  when: not (install | default(true) | bool)
  block:
    - name: Remove fzf binary
      ansible.builtin.file:
        path: "{{ ansible_user_dir }}/.local/bin/fzf"
        state: absent

    - name: Remove fzf shell integration from zsh
      ansible.builtin.lineinfile:
        path: "{{ ansible_user_dir }}/.config/zsh/local.zsh"
        line: 'command -v fzf >/dev/null && eval "$(fzf --zsh)"'
        state: absent

    - name: Remove fzf Catppuccin theme source from zsh
      ansible.builtin.lineinfile:
        path: "{{ ansible_user_dir }}/.config/zsh/local.zsh"
        line: '[ -f "$HOME/.config/fzf/catppuccin-mocha.sh" ] && source "$HOME/.config/fzf/catppuccin-mocha.sh"'
        state: absent

    - name: Remove fzf config directory
      ansible.builtin.file:
        path: "{{ ansible_user_dir }}/.config/fzf"
        state: absent

- name: Install ripgrep
  when: install | default(true) | bool
  block:
    - name: Check if rg binary exists
      ansible.builtin.stat:
        path: "{{ ansible_user_dir }}/.local/bin/rg"
      register: rg_bin

    - name: Get latest ripgrep release
      ansible.builtin.uri:
        url: https://api.github.com/repos/BurntSushi/ripgrep/releases/latest
        return_content: true
      register: rg_release
      when: not rg_bin.stat.exists

    - name: Download and extract rg binary
      ansible.builtin.unarchive:
        src: "https://github.com/BurntSushi/ripgrep/releases/download/{{ rg_release.json.tag_name }}/ripgrep-{{ rg_release.json.tag_name }}-x86_64-unknown-linux-musl.tar.gz"
        dest: "{{ ansible_user_dir }}/.local/bin"
        include:
          - "ripgrep-{{ rg_release.json.tag_name }}-x86_64-unknown-linux-musl/rg"
        extra_opts:
          - --strip-components=1
        mode: '0755'
        remote_src: true
      when: not rg_bin.stat.exists

- name: Uninstall ripgrep
  when: not (install | default(true) | bool)
  block:
    - name: Remove rg binary
      ansible.builtin.file:
        path: "{{ ansible_user_dir }}/.local/bin/rg"
        state: absent

